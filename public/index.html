<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking CLF System</title>
    <style>
        :root { --blue: #3b82f6; --green: #22c55e; --orange: #f59e0b; --red: #ef4444; --gray: #64748b; --light: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 480px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; }
        button { border: none; font-weight: bold; cursor: pointer; color: white; background: var(--blue); }
        .btn-green { background: var(--green); } .btn-orange { background: var(--orange); } .btn-red { background: var(--red); } .btn-gray { background: var(--gray); }
        
        /* Box Successo (IMG 3) */
        .summary-box { background: var(--light); padding: 15px; border-radius: 12px; text-align: left; margin: 15px 0; border: 1px solid #e2e8f0; }
        .summary-item { margin-bottom: 8px; font-size: 14px; }
        .summary-item b { color: var(--blue); }

        /* Calendario */
        #cal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 180px; overflow-y: auto; margin: 10px 0; }
        .day-slot { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; }
        .selected { background: var(--blue); color: white; }

        /* Piantone */
        .search-container { display: flex; gap: 10px; background: var(--light); padding: 5px; border-radius: 15px; border: 1px solid #cbd5e1; }
        .search-container input { border: none; background: transparent; margin: 0; }
        .search-container button { width: 80px; margin: 0; }
        .piantone-btns { display: flex; gap: 15px; margin-top: 20px; }
        .btn-col { flex: 1; text-align: center; }
        .ts-info { font-size: 11px; color: var(--gray); margin-top: 5px; line-height: 1.3; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <div id="view-login">
            <h2 style="text-align:center;">🅿️ CLF Fontanarossa</h2>
            <input type="text" id="in-npass" placeholder="IL TUO PASS">
            <button onclick="doLogin()">Entra</button>
            <button class="btn-red" onclick="window.close()">ESCI</button>
        </div>

        <div id="view-user" class="hidden">
            <h3>📅 Prenota Posto</h3>
            <div id="cal-grid"></div>
            <input type="email" id="u-email" placeholder="Email conferma">
            <button onclick="inviaPren()">INVIA PRENOTAZIONE</button>
            <button class="btn-gray" onclick="mostraMie()">Le mie prenotazioni</button>
            <button class="btn-red" style="margin-top:15px;" onclick="location.reload()">ESCI</button>
        </div>

        <div id="view-my-list" class="hidden">
            <h3>Le mie Date</h3>
            <div id="my-list-content"></div>
            <button class="btn-gray" onclick="show('view-user')">Indietro</button>
        </div>

        <div id="view-success" class="hidden" style="text-align:center;">
            <div style="font-size:50px; color:var(--green)">✅</div>
            <h3>Prenotazione Effettuata</h3>
            <div class="summary-box" id="summary-details"></div>
            <button onclick="location.reload()">Torna alla Home</button>
        </div>

        <div id="view-piantone" class="hidden">
            <h3>Controllo Sbarra 🚧</h3>
            <div class="search-container">
                <input type="text" id="search-p" placeholder="Cerca Pass...">
                <button onclick="cercaPass()">Cerca</button>
            </div>
            <div id="panel-piantone" class="hidden" style="margin-top:20px;">
                <h4 id="lab-pass">PASS: ---</h4>
                <div class="piantone-btns">
                    <div class="btn-col">
                        <button class="btn-green" onclick="mossa('E')">ENTRATA</button>
                        <div id="info-e" class="ts-info"></div>
                    </div>
                    <div class="btn-col">
                        <button class="btn-orange" onclick="mossa('U')">USCITA</button>
                        <div id="info-u" class="ts-info"></div>
                    </div>
                </div>
            </div>
            <h4 style="margin-top:25px;">🏎️ Veicoli Dentro</h4>
            <div id="lista-veicoli"></div>
            <button class="btn-gray" style="margin-top:20px;" onclick="location.reload()">ESCI</button>
        </div>

        <div id="view-admin" class="hidden">
            <h3>📊 Cruscotto Admin</h3>
            <table id="tab-admin"></table>
            <button class="btn-gray" style="margin-top:20px;" onclick="location.reload()">ESCI</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
