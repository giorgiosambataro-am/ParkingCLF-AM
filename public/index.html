<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcheggio C.L. Fontanarossa</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #3b82f6; color: white; font-weight: bold; cursor: pointer; border: none; }
        .day-slot { display: inline-block; padding: 10px; border: 1px solid #eee; margin: 2px; cursor: pointer; border-radius: 5px; }
        .selected { background: #3b82f6; color: white; }
        .status-tag { padding: 4px 8px; border-radius: 5px; color: white; font-size: 11px; font-weight: bold; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-section">
            <h2>🅿️ Accesso Parcheggio</h2>
            <input type="text" id="npass" placeholder="Inserisci NPASS">
            <button onclick="verificaAccesso()">Entra</button>
        </div>

        <div id="piantone-section" class="card" style="display:none; max-width: 500px;">
    <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px;">
        Controllo Sbarra 🚧
    </h1>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="search-npass" placeholder="D0003" style="flex: 1; background: #eef2ff;">
        <button onclick="cercaPassPiantone()" style="width: auto; padding: 0 25px;">Cerca</button>
    </div>

    <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">

    <div id="piantone-risultato" style="display: none;">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
            <button id="btn-e" onclick="azionePiantone('E')" style="background: #22c55e; width: 100px; height: 80px; border-radius: 15px; font-size: 14px;">
                ENTRATA (E)
            </button>
            
            <div style="text-align: center;">
                <h2 id="p-npass" style="margin: 0; font-size: 24px; color: #1e293b;">PASS: ----</h2>
                <p style="margin: 5px 0 0; font-weight: bold; color: #1e293b;">
                    Stato attuale: <span id="p-stato">----</span>
                </p>
            </div>

            <button id="btn-u" onclick="azionePiantone('U')" style="background: #f59e0b; width: 100px; height: 80px; border-radius: 15px; font-size: 14px;">
                USCITA (U)
            </button>
        </div>
    </div>

    <div style="margin-top: 40px;">
        <h3 style="display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 18px;">
            🏎️ Veicoli nel Parcheggio
        </h3>
        <table style="width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; font-size: 13px;">
            <thead>
                <tr style="border-bottom: 1px solid #eee; color: #64748b;">
                    <th style="padding: 10px 5px;">NPASS</th>
                    <th style="padding: 10px 5px;">Info Movimento</th>
                    <th style="padding: 10px 5px;">Stato</th>
                </tr>
            </thead>
            <tbody id="monitor-table-body">
                </tbody>
        </table>
    </div>

    <button onclick="location.reload()" style="background: #64748b; margin-top: 25px;">Esci</button>
</div>

        </div>
    <script src="script.js"></script>
</body>
</html>
