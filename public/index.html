<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLF Parking System</title>
    <style>
        :root { --blue: #3b82f6; --green: #22c55e; --orange: #f59e0b; --red: #ef4444; --gray: #64748b; --light: #f8fafc; }
        body { font-family: sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 480px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; font-size: 16px; box-sizing: border-box; }
        button { border: none; font-weight: bold; cursor: pointer; color: white; background: var(--blue); }
        .btn-green { background: var(--green); } 
        .btn-orange { background: var(--orange); } 
        .btn-red { background: var(--red); } 
        .btn-gray { background: var(--gray); }
        
        /* Calendario Utente */
        #cal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .day-slot { display: inline-block; padding: 12px 5px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; text-align: center; font-size: 14px; }
        .selected { background: var(--blue); color: white; border-color: var(--blue); }
        
        /* Layout Piantone Pulsanti */
        .piantone-actions { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn-container { text-align: center; }
        .btn-sub-date { font-size: 13px; color: #64748b; margin-top: 5px; line-height: 1.4; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; color: white; font-weight: bold; }
        .badge-green { background: var(--green); }
        .badge-orange { background: var(--orange); }
    </style>
</head>
<body>
    <div class="card">
        
        <div id="view-login">
            <h2 style="text-align:center; color:var(--blue)">🅿️ C.L. Fontanarossa</h2>
            <input type="text" id="in-npass" placeholder="Inserisci il tuo PASS (es. D0003)">
            <button onclick="doLogin()">Entra</button>
        </div>

        <div id="view-user" class="hidden">
            <h3 style="display:flex; align-items:center; gap:8px;">📅 Prenota Posto</h3>
            <div id="cal-grid"></div>
            
            <input type="email" id="u-email" placeholder="Email per la conferma">
            <button onclick="inviaPren()">INVIA PRENOTAZIONE</button>
            <button class="btn-gray" onclick="mostraMie()">Le mie prenotazioni</button>
            <button class="btn-red" style="margin-top:20px;" onclick="location.reload()">Log-out</button>
        </div>

        <div id="view-my-list" class="hidden">
            <h3 style="color:var(--blue)">🅿️ Le mie Prenotazioni</h3>
            <div id="my-list-content"></div>
            <button class="btn-red" style="margin-top:15px;" onclick="eliminaTutte()">Elimina tutte le mie prenotazioni</button>
            <button class="btn-gray" onclick="show('view-user')">Torna al calendario</button>
        </div>

        <div id="view-success" class="hidden" style="text-align:center;">
            <div style="font-size:60px; color:var(--green)">✅</div>
            <h2>Prenotazione Inviata!</h2>
            <p>Controlla la tua email per la conferma.</p>
            <button style="margin-top:20px;" onclick="location.reload()">Torna alla Home</button>
        </div>

        <div id="view-piantone" class="hidden">
            <h3 style="text-align:center; color:var(--blue); display:flex; justify-content:center; align-items:center; gap:8px;">
                <span>🅿️</span> Controllo Sbarra 🚧
            </h3>
            
            <div style="display:flex; gap:10px;">
                <input type="text" id="search-p" placeholder="Cerca Pass (es. D0003)">
                <button style="width:100px" onclick="cercaPass()">Cerca</button>
            </div>
            
            <div id="panel-piantone" class="hidden" style="background:var(--light); padding:20px; border-radius:15px; margin-top:20px;">
                <h3 id="lab-pass" style="margin:0 0 10px 0;">PASS: ---</h3>
                <p id="lab-stato" style="margin:0; font-weight:bold;">Stato attuale: ---</p>
                
                <div class="piantone-actions">
                    <div class="btn-container">
                        <button class="btn-green" onclick="mossa('E')">ENTRATA (E)</button>
                        <div id="info-e" class="btn-sub-date"></div>
                    </div>
                    <div class="btn-container">
                        <button class="btn-orange" onclick="mossa('U')">USCITA (U)</button>
                        <div id="info-u" class="btn-sub-date"></div>
                    </div>
                </div>
            </div>

            <h4 style="margin-top:30px; border-bottom:2px solid #eee; padding-bottom:10px;">🏎️ Veicoli nel Parcheggio</h4>
            <div id="lista-veicoli"></div>
            
            <button class="btn-gray" style="margin-top:30px;" onclick="location.reload()">Log-out</button>
        </div>

        <div id="view-admin" class="hidden">
            <h3 style="color:var(--blue); display:flex; align-items:center; gap:8px;">📊 Cruscotto Amministratore</h3>
            <table id="tab-admin"></table>
            <button class="btn-gray" style="margin-top:30px;" onclick="location.reload()">Esci</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
