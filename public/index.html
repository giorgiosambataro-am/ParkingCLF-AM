<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcheggio C.L. Fontanarossa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 480px; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; }
        button { cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: #3b82f6; color: white; width: 100%; padding: 12px; border-radius: 10px; }
        .btn-gray { background: #64748b; color: white; width: 100%; padding: 12px; border-radius: 10px; margin-top: 10px; }
        /* Stili Maschera Piantone */
        .piantone-header { text-align: center; margin-bottom: 25px; }
        .box-azione { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 15px; border-radius: 15px; margin: 20px 0; }
        .btn-azione { width: 100px; height: 80px; border-radius: 15px; color: white; font-size: 13px; }
        .day-slot { display: inline-block; padding: 8px; border: 1px solid #eee; margin: 2px; border-radius: 5px; cursor: pointer; }
        .day-slot.selected { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div id="login-section">
            <h1 style="text-align:center;">Parcheggio C.L. Fontanarossa</h1>
            <h3 style="margin-top:30px;">Credenziali Accesso</h3>
            <input type="text" id="npass" placeholder="INS. NPASS">
            <button class="btn-blue" onclick="verificaAccesso()">Entra</button>
        </div>

        <div id="calendar-section" style="display:none;">
            <h2>Seleziona i giorni</h2>
            <div id="calendar-grid" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;"></div>
            <input type="email" id="email-utente" placeholder="Tua Email">
            <button class="btn-blue" onclick="confermaPrenotazione()">Invia Prenotazione</button>
            <button class="btn-gray" onclick="mostraMiePrenotazioni()">Le mie prenotazioni</button>
        </div>

        <div id="my-reservations-section" style="display:none;">
            <h2>Le mie Prenotazioni</h2>
            <div id="list-reservations"></div>
            <button class="btn-gray" onclick="tornaHome()">Torna al calendario</button>
        </div>

        <div id="piantone-section" style="display:none;">
            <div class="piantone-header"><h1>Controllo Sbarra 🚧</h1></div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search-npass" placeholder="D0003" style="background:#eef2ff; margin:0;">
                <button class="btn-blue" style="width:100px; margin:0;" onclick="cercaPassPiantone()">Cerca</button>
            </div>
            <div id="piantone-risultato" style="display:none;">
                <div class="box-azione">
                    <button id="btn-e" class="btn-azione" style="background:#22c55e;" onclick="azionePiantone('E')">ENTRATA (E)</button>
                    <div style="text-align:center;">
                        <h2 id="p-npass" style="margin:0;">PASS: ----</h2>
                        <small>Stato attuale: <b id="p-stato">----</b></small>
                    </div>
                    <button id="btn-u" class="btn-azione" style="background:#f59e0b;" onclick="azionePiantone('U')">USCITA (U)</button>
                </div>
            </div>
            <div style="margin-top:30px;">
                <h4 style="text-align:center;">🏎️ Veicoli nel Parcheggio</h4>
                <table style="width:100%; font-size:11px; border-collapse: collapse;" id="monitor-table"></table>
            </div>
            <button class="btn-gray" onclick="location.reload()">Esci</button>
        </div>

        <div id="admin-section" style="display:none;">
            <h2>Cruscotto Amministratore</h2>
            <table id="admin-table" style="width:100%; border:1px solid #eee;"></table>
            <button class="btn-gray" onclick="location.reload()">Esci</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
