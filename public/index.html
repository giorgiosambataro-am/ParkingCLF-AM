<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLF Parking System</title>
    <style>
        :root { --blue: #3b82f6; --green: #22c55e; --orange: #f59e0b; --red: #ef4444; --gray: #64748b; --light: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: #e2e8f0; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 24px; width: 100%; max-width: 480px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        h2, h3 { color: var(--blue); text-align: center; margin-top: 0; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 14px; border: 1px solid #cbd5e1; font-size: 16px; box-sizing: border-box; }
        button { border: none; font-weight: bold; cursor: pointer; color: white; background: var(--blue); transition: opacity 0.2s; }
        .btn-green { background: var(--green); } .btn-orange { background: var(--orange); } .btn-gray { background: var(--gray); } .btn-red { background: var(--red); }
        
        /* Calendario */
        #cal-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 200px; overflow-y: auto; padding: 10px; background: var(--light); border-radius: 15px; }
        .day-slot { padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; text-align: center; cursor: pointer; font-size: 14px; background: white; }
        .selected { background: var(--blue); color: white; border-color: var(--blue); }

        /* Piantone Ricerca (IMG 2) */
        .search-box { display: flex; align-items: center; background: var(--light); border-radius: 14px; padding: 5px 15px; border: 1px solid #cbd5e1; }
        .search-box input { border: none; background: transparent; margin: 0; padding: 10px; }
        .search-box button { width: auto; padding: 10px 20px; margin: 0; }

        /* Piantone Pulsanti (IMG 4) */
        .piantone-btns { display: flex; gap: 15px; margin-top: 20px; }
        .action-group { flex: 1; text-align: center; }
        .timestamp { font-size: 12px; color: var(--gray); margin-top: 8px; font-weight: bold; line-height: 1.4; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        .badge { padding: 5px 10px; border-radius: 8px; color: white; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div id="view-login">
            <h2>🅿️ CLF Fontanarossa</h2>
            <input type="text" id="in-npass" placeholder="IL TUO PASS (es. D0003)">
            <button onclick="doLogin()">Entra</button>
        </div>

        <div id="view-user" class="hidden">
            <h3>📅 Prenota Posto</h3>
            <div id="cal-grid"></div>
            <input type="email" id="u-email" placeholder="Email per conferma">
            <button onclick="inviaPren()">CONFERMA PRENOTAZIONE</button>
            <button class="btn-gray" onclick="mostraMie()">Le mie prenotazioni</button>
        </div>

        <div id="view-my-list" class="hidden">
            <h3>Le mie Date</h3>
            <div id="my-list-content"></div>
            <button class="btn-gray" onclick="show('view-user')">Indietro</button>
        </div>

        <div id="view-piantone" class="hidden">
            <h3>Controllo Sbarra 🚧</h3>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="search-p" placeholder="Cerca Pass...">
                <button onclick="cercaPass()">Cerca</button>
            </div>

            <div id="panel-piantone" class="hidden" style="margin-top:20px; padding:15px; background:var(--light); border-radius:18px;">
                <h4 id="lab-pass" style="margin:0">PASS: ---</h4>
                <div class="piantone-btns">
                    <div class="action-group">
                        <button class="btn-green" onclick="mossa('E')">ENTRATA</button>
                        <div id="info-e" class="timestamp">--/--/----<br>--:--</div>
                    </div>
                    <div class="action-group">
                        <button class="btn-orange" onclick="mossa('U')">USCITA</button>
                        <div id="info-u" class="timestamp">--/--/----<br>--:--</div>
                    </div>
                </div>
            </div>

            <h4>🏎️ Veicoli nel Parcheggio</h4>
            <div id="lista-veicoli"></div>
            <button class="btn-gray" style="margin-top:20px" onclick="location.reload()">Esci</button>
        </div>

        <div id="view-admin" class="hidden">
            <h3>📊 Cruscotto Posti</h3>
            <table id="tab-admin"></table>
            <button class="btn-gray" style="margin-top:20px" onclick="location.reload()">Esci</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
