<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcheggio C.L. Fontanarossa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Parcheggio C.L. Fontanarossa</h1>

        <div id="login-section" class="card">
            <h2>Accedi con il tuo Pass</h2>
            <input type="text" id="npass" placeholder="Inserisci NPASS (es. D003A)" style="text-transform: uppercase;">
            <button onclick="verificaAccesso()">Entra</button>
        </div>

        <div id="calendar-section" class="card" style="display:none;">
            <h3>Seleziona i giorni</h3>
            <div id="calendar-grid"></div>
            <input type="email" id="email-utente" placeholder="Tua Email per la ricevuta">
            <button onclick="confermaPrenotazioni()">Conferma Prenotazione</button>
        </div>

        <div id="admin-section" class="card" style="display:none;">
            <h2 style="color: #2563eb;">📊 Cruscotto Amministratore</h2>
            <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                <thead>
                    <tr style="background: #eee;">
                        <th>Data</th>
                        <th>Occupati</th>
                        <th>Liberi</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
            <button onclick="location.reload()" style="margin-top:20px; background:#64748b;">Esci</button>
        </div>

        <div id="success-section" class="card" style="display:none;">
            <h2>✅ Prenotazione Inviata!</h2>
            <p>Controlla la tua email per la conferma.</p>
            <button onclick="location.reload()">Torna alla Home</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
