<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazione Parcheggio C.L. Fontanarossa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div id="login-section" class="card fade-in">
            <div class="logo">🅿️</div>
            <h1>Accesso Portale</h1>
            <input type="text" id="npass-input" placeholder="Codice NPASS (Obbligatorio)">
            <input type="email" id="email-input" placeholder="Tua Email (Per conferma)">
            <button onclick="verificaAccesso()">Accedi al Calendario</button>
        </div>

        <div id="calendar-section" class="card fade-in" style="display: none;">
            <div class="calendar-header">
                <button onclick="cambiaMese(-1)">◀</button>
                <h2 id="mese-corrente">Maggio 2026</h2>
                <button onclick="cambiaMese(1)">▶</button>
            </div>
            
            <div id="calendario-gigante" class="grid-calendario"></div>

            <div class="footer-calendar">
                <p>Selezionati: <strong id="conteggio-giorni">0</strong> giorni</p>
                <button onclick="confermaPrenotazioni()" id="btn-conferma" disabled>Conferma e Invia Email</button>
            </div>
        </div>

<div id="admin-section" style="display:none; padding: 20px; background: white; border-radius: 15px; margin-top: 20px;">
    <h2 style="color: #2563eb;">📊 Cruscotto Amministratore</h2>
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #f1f5f9;">
                <th style="padding: 10px; border: 1px solid #ddd;">Data</th>
                <th style="padding: 10px; border: 1px solid #ddd;">Posti Occupati</th>
                <th style="padding: 10px; border: 1px solid #ddd;">Posti Liberi</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            </tbody>
    </table>
    <button onclick="location.reload()" style="margin-top:20px; background: #64748b; color:white; border:none; padding:10px 20px; border-radius:10px;">Esci</button>
</div>

        <div id="success-section" class="card fade-in" style="display: none;">
            <div class="success-icon">✅</div>
            <h2>Prenotazione Effettuata!</h2>
            <div id="riepilogo-dati"></div>
            <p class="nota-email">La conferma è stata inviata all'indirizzo riportato.</p>
            <button onclick="location.reload()">Torna alla Home</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
