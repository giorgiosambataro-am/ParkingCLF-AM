<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenotazione Logistica V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>Sistema Parcheggi</h1>

        <div id="login-section" class="card">
            <h2>Inserisci il tuo NPASS</h2>
            <p>Inserisci la tua chiave univoca per accedere al calendario.</p>
            <input type="text" id="npass-input" placeholder="Es. PASS-1234">
            <button onclick="verificaAccesso()">Accedi</button>
        </div>

        <div id="calendar-section" class="card" style="display: none;">
            <h2>Seleziona le giornate</h2>
            <p>Posti massimi per giorno: 120. I giorni rossi sono al completo.</p>
            
            <div id="calendario-gigante" class="grid-calendario">
                </div>

            <div class="riepilogo">
                <p>Giorni selezionati: <span id="conteggio-giorni">0</span></p>
                <button onclick="confermaPrenotazioni()" id="btn-conferma" disabled>Conferma Prenotazione</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
